<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#17111d">
<title>Dig Quest — A Field Journal Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=Atkinson+Hyperlegible:wght@400;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* dusk excavation palette */
    --void:#17111d;
    --void-2:#221a2a;
    --surface:#2b2032;
    --surface-2:#352741;
    --line:#4a3654;

    --soil-deep:#4a2c1a;
    --soil:#7a4b28;
    --soil-top:#a86c3c;

    --amber:#ffb02e;
    --amber-hot:#ffd166;
    --cream:#f8eeda;
    --sand:#d6c4ad;
    --sand-dim:#9a8a7c;
    --ink:#241a12;
    --ink-soft:#5f4c3a;

    /* artifact identity colors — each buried find gets its own */
    --f1:#ffc233;
    --f2:#3ddad7;
    --f3:#ff6ba8;

    --rust:#e0533a;
    --stamp:#c23a22;

    --display:'Fraunces', Georgia, serif;
    --body:'Atkinson Hyperlegible', system-ui, sans-serif;
    --mono:'IBM Plex Mono', monospace;

    --spring:cubic-bezier(.2,1.3,.4,1);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:
      radial-gradient(900px 520px at 50% -8%, rgba(255,176,46,0.20), transparent 62%),
      radial-gradient(700px 500px at 88% 12%, rgba(61,218,215,0.09), transparent 60%),
      var(--void);
    background-attachment:fixed;
    color:var(--sand);
    font-family:var(--body);
    line-height:1.5;
    min-height:100dvh;
    overflow-x:hidden;
  }
  #app{
    max-width:540px;
    margin:0 auto;
    padding:14px 14px calc(40px + env(safe-area-inset-bottom));
    min-height:100dvh;
    display:flex;
    flex-direction:column;
  }
  #fx{position:fixed; inset:0; pointer-events:none; z-index:99; overflow:hidden;}
  .particle{position:fixed; border-radius:50%; pointer-events:none; will-change:transform,opacity;
    animation:fly .7s cubic-bezier(.2,.7,.3,1) forwards;}
  @keyframes fly{ to{ transform:translate(var(--dx), var(--dy)) scale(0.2); opacity:0; } }
  .shakescreen{animation:screenshake .38s ease;}
  @keyframes screenshake{
    10%{transform:translate(-4px,2px) rotate(-.3deg);}
    30%{transform:translate(5px,-3px) rotate(.4deg);}
    50%{transform:translate(-4px,1px);}
    70%{transform:translate(3px,2px);}
    100%{transform:none;}
  }

  .eyebrow{
    font-family:var(--mono); font-size:11px; font-weight:600;
    letter-spacing:.16em; text-transform:uppercase; color:var(--amber);
  }
  h1,h2,h3{font-family:var(--display); line-height:1.1;}
  button{font-family:var(--body); cursor:pointer; border:none; border-radius:12px;}
  button:focus-visible, .tile:focus-visible{outline:3px solid var(--amber); outline-offset:3px;}

  .btn-main{
    background:linear-gradient(180deg, var(--amber-hot), var(--amber));
    color:var(--ink); font-weight:700; font-size:17px;
    padding:15px 26px; border-radius:14px;
    box-shadow:0 5px 0 #b9741a, 0 10px 24px rgba(255,176,46,.28);
    transition:transform .1s var(--spring), box-shadow .1s ease;
  }
  .btn-main:active{transform:translateY(4px); box-shadow:0 1px 0 #b9741a;}
  .btn-ghost{
    background:rgba(255,255,255,.04); color:var(--sand);
    border:1.5px solid var(--line); padding:11px 16px;
    font-size:14.5px; font-weight:700; border-radius:12px;
    transition:border-color .15s ease, background .15s ease;
  }
  .btn-ghost:hover{border-color:var(--amber); color:var(--amber-hot);}
  .btn-ghost:active{transform:scale(.97);}
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:16px;}
  .topbar .title{font-family:var(--display); font-weight:900; font-size:19px; color:var(--cream);}
  .mute{background:none; border:none; font-size:18px; padding:6px; opacity:.75;}

  /* ---------- title ---------- */
  .screen-title{flex:1; display:flex; flex-direction:column; justify-content:center; text-align:center; gap:20px;}
  .title-emblem{font-size:70px; line-height:1; animation:bob 3.2s ease-in-out infinite;
    filter:drop-shadow(0 10px 22px rgba(255,176,46,.4));}
  @keyframes bob{50%{transform:translateY(-10px) rotate(-6deg);}}
  .screen-title h1{
    font-size:clamp(46px, 13vw, 66px); font-weight:900; color:var(--cream);
    letter-spacing:-.02em;
    text-shadow:0 0 40px rgba(255,176,46,.35);
    animation:fadeUp .6s var(--spring) both;
  }
  .screen-title h1 .accent{
    background:linear-gradient(90deg, var(--f1), var(--f3));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .tagline{color:var(--sand); font-size:16.5px; max-width:36ch; margin:0 auto;}
  .promise{
    font-family:var(--mono); font-size:11.5px; color:var(--sand-dim);
    border:1px dashed var(--line); border-radius:12px;
    padding:11px 12px; max-width:38ch; margin:0 auto;
    background:rgba(255,255,255,.02);
  }
  .promise b{color:var(--amber-hot); font-weight:600;}

  /* ---------- map ---------- */
  .map-head{margin-bottom:14px;}
  .map-head h2{font-size:29px; color:var(--cream); font-weight:900;}
  .map-head p{color:var(--sand-dim); font-size:14.5px;}
  .sites{display:flex; flex-direction:column; gap:11px;}
  .site-card{
    display:flex; align-items:center; gap:13px; width:100%; text-align:left;
    background:linear-gradient(150deg, var(--surface), var(--void-2));
    border:1.5px solid var(--line); border-radius:16px; padding:13px;
    color:var(--sand); position:relative; overflow:hidden;
    transition:transform .12s var(--spring), border-color .15s ease;
    animation:fadeUp .4s var(--spring) both;
  }
  .site-card:hover{border-color:var(--amber); transform:translateY(-2px);}
  .site-card:active{transform:scale(.985);}
  .site-emoji{
    font-size:32px; width:56px; height:56px; display:grid; place-items:center;
    background:radial-gradient(circle at 40% 35%, rgba(255,176,46,.28), rgba(255,176,46,.06));
    border-radius:14px; flex-shrink:0;
  }
  .site-info{flex:1; min-width:0;}
  .site-info h3{font-size:18.5px; color:var(--cream); font-weight:900;}
  .site-info .where{font-family:var(--mono); font-size:10.5px; font-weight:600; letter-spacing:.12em;
    text-transform:uppercase; color:var(--amber); margin-bottom:1px; display:block;}
  .site-info .prog{font-size:13px; color:var(--sand-dim); margin-top:3px; display:block;}
  .site-done{color:var(--amber-hot); font-size:22px;}
  .site-bar{height:5px; border-radius:99px; background:rgba(255,255,255,.08); margin-top:7px; overflow:hidden;}
  .site-bar i{display:block; height:100%; border-radius:99px;
    background:linear-gradient(90deg, var(--f1), var(--amber)); transition:width .5s var(--spring);}
  .nav-row{display:flex; gap:9px; margin-top:16px;}
  .nav-row .btn-ghost{flex:1;}
  .master-banner{
    margin-top:14px; text-align:center; border-radius:16px; padding:18px;
    background:linear-gradient(135deg, rgba(255,194,51,.22), rgba(255,107,168,.18));
    border:1.5px solid var(--amber);
    animation:fadeUp .5s var(--spring) both;
  }
  .master-banner .big{font-size:38px;}
  .master-banner h3{color:var(--amber-hot); font-size:21px; margin:4px 0 2px; font-weight:900;}
  .master-banner p{font-size:14px; color:var(--sand);}

  /* ---------- world map ---------- */
  .map-wrap{
    position:relative;
    border-radius:18px;
    border:1.5px solid var(--line);
    background:
      radial-gradient(600px 300px at 30% 0%, rgba(61,218,215,.07), transparent 60%),
      linear-gradient(160deg, var(--void-2), var(--void));
    overflow:hidden;
    margin-bottom:13px;
    animation:fadeUp .45s var(--spring) both;
  }
  .map-wrap svg{display:block; width:100%; height:auto;}
  .map-land{fill:#3d2f4d; stroke:#5a4470; stroke-width:1.2;}
  .map-grid{stroke:rgba(255,255,255,.05); stroke-width:1;}
  .map-label{
    font-family:var(--mono); font-size:19px; font-weight:600;
    fill:var(--sand-dim); letter-spacing:.14em; text-transform:uppercase;
  }
  .pin-hit{fill:transparent; cursor:pointer;}
  .pin-dot{fill:var(--amber); stroke:#fff3; stroke-width:2; cursor:pointer;
    filter:drop-shadow(0 0 6px rgba(255,176,46,.8));}
  .pin-dot.done{fill:#5fd068; filter:drop-shadow(0 0 6px rgba(95,208,104,.8));}
  .pin-ring{fill:none; stroke:var(--amber); stroke-width:2; opacity:0;
    transform-box:fill-box; transform-origin:center;
    animation:ping 2.2s ease-out infinite;}
  .pin-ring.done{stroke:#5fd068; animation:none;}
  @keyframes ping{
    0%{transform:scale(.5); opacity:.9;}
    70%{transform:scale(2.1); opacity:0;}
    100%{opacity:0;}
  }
  .pin-num{
    font-family:var(--mono); font-size:20px; font-weight:600;
    fill:var(--cream); pointer-events:none;
    paint-order:stroke; stroke:rgba(15,10,20,.85); stroke-width:4px;
  }
  .pin-g{cursor:pointer;}
  .pin-g:hover .pin-dot{filter:drop-shadow(0 0 12px rgba(255,209,102,1));}
  .hq-icon{font-size:22px; pointer-events:none;}
  .trail{fill:none; stroke:var(--amber-hot); stroke-width:2.5;
    stroke-dasharray:5 7; stroke-linecap:round; opacity:.9;
    filter:drop-shadow(0 0 4px rgba(255,176,46,.6));}
  .plane{font-size:26px; pointer-events:none;}
  .map-hint{
    position:absolute; bottom:7px; left:0; right:0; text-align:center;
    font-family:var(--mono); font-size:10.5px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--sand-dim); pointer-events:none;
  }

  .quest-card{cursor:default;}
  .quest-card:hover{border-color:var(--line); transform:none;}
  .quest-card:active{transform:none;}
  .quest-done{border-color:var(--amber); background:linear-gradient(150deg, rgba(255,176,46,.16), var(--void-2));}
  .quest-done .site-emoji{background:radial-gradient(circle at 40% 35%, rgba(255,176,46,.5), rgba(255,176,46,.12));}
  .prog-done{color:var(--amber-hot) !important; font-weight:700;}

  /* ---------- dig ---------- */
  .dig-head h2{font-size:24px; color:var(--cream); font-weight:900;}
  .dig-head p{font-size:13px; color:var(--sand-dim);}
  .frag-tracker{display:flex; gap:8px; flex-wrap:wrap; margin:12px 0 10px;}
  .frag-pill{
    font-family:var(--mono); font-size:11.5px; font-weight:600;
    border-radius:99px; padding:6px 11px;
    background:rgba(255,255,255,.04);
    border:1.5px solid var(--line); color:var(--sand-dim);
    display:flex; align-items:center; gap:6px;
    transition:all .3s var(--spring);
  }
  .frag-pill .dot{width:9px; height:9px; border-radius:50%; box-shadow:0 0 8px currentColor;}
  .frag-pill.live{color:var(--cream);}
  .frag-pill.full{background:rgba(255,255,255,.09);}
  .grid{display:grid; grid-template-columns:repeat(5,1fr); gap:7px; margin:6px 0 13px;}
  .tile{
    aspect-ratio:1; border-radius:11px; border:none; position:relative;
    display:grid; place-items:center; font-size:20px;
    background:
      radial-gradient(circle at 22% 28%, rgba(255,255,255,.10) 1px, transparent 2px),
      radial-gradient(circle at 68% 62%, rgba(0,0,0,.22) 1.5px, transparent 3px),
      radial-gradient(circle at 45% 80%, rgba(255,255,255,.06) 1px, transparent 2px),
      linear-gradient(160deg, var(--soil), var(--soil-deep));
    box-shadow:inset 0 -4px 0 rgba(0,0,0,.32), inset 0 2px 0 rgba(255,255,255,.09), 0 2px 6px rgba(0,0,0,.3);
    transition:transform .1s var(--spring), background .2s ease, box-shadow .2s ease;
    cursor:pointer;
  }
  .tile:active{transform:scale(.9);}
  .tile.depth1{
    background:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,.12) 1.5px, transparent 3px),
      radial-gradient(circle at 70% 65%, rgba(0,0,0,.18) 2px, transparent 4px),
      linear-gradient(160deg, var(--soil-top), var(--soil));
  }
  .tile.cleared{
    background:linear-gradient(160deg, #241a14, #191009);
    box-shadow:inset 0 4px 10px rgba(0,0,0,.65);
    cursor:default;
  }
  .tile.cleared:active{transform:none;}
  .tile.fragment{
    background:linear-gradient(160deg, var(--fc), color-mix(in srgb, var(--fc) 62%, #000));
    box-shadow:0 0 0 2px rgba(255,255,255,.28) inset, 0 0 18px var(--fc), 0 3px 8px rgba(0,0,0,.4);
    cursor:pointer;
    animation:popIn .45s var(--spring) both;
  }
  .tile.fragment::after{
    content:attr(data-n);
    position:absolute; top:3px; right:5px;
    font-family:var(--mono); font-size:10px; font-weight:600;
    color:rgba(0,0,0,.62);
  }
  .tile.fragment .fi{filter:drop-shadow(0 1px 2px rgba(0,0,0,.4));}
  .tile.pulse{animation:pulse .5s ease;}
  @keyframes pulse{50%{transform:scale(1.14); box-shadow:0 0 26px var(--fc);}}
  .tile.shake{animation:tshake .4s ease;}
  @keyframes tshake{
    20%{transform:translateX(-6px) rotate(-3deg);}
    40%{transform:translateX(6px) rotate(3deg);}
    60%{transform:translateX(-4px) rotate(-2deg);}
    80%{transform:translateX(4px);}
  }
  @keyframes popIn{0%{transform:scale(.4) rotate(-18deg); opacity:0;} 100%{transform:none; opacity:1;}}

  .tools{display:flex; gap:9px;}
  .tool{
    flex:1; display:flex; align-items:center; justify-content:center; gap:7px;
    padding:14px; font-size:15.5px; font-weight:700;
    background:rgba(255,255,255,.04); color:var(--sand);
    border:2px solid var(--line); border-radius:14px;
    transition:all .15s var(--spring);
  }
  .tool:active{transform:scale(.96);}
  .tool.active{
    border-color:var(--amber); color:var(--ink);
    background:linear-gradient(180deg, var(--amber-hot), var(--amber));
    box-shadow:0 0 20px rgba(255,176,46,.35);
  }
  .dig-tip{
    margin-top:12px; font-size:14.5px; color:var(--sand);
    background:var(--surface); border-left:3px solid var(--amber);
    border-radius:0 12px 12px 0; padding:11px 13px; min-height:46px;
  }
  .dig-tip b{color:var(--amber-hot);}
  .dig-tip.flash{animation:tipflash .75s ease;}
  @keyframes tipflash{
    0%{background:rgba(255,176,46,.3); transform:translateX(4px);}
    100%{background:var(--surface); transform:none;}
  }

  /* ---------- modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(10,6,14,.82);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    display:grid; place-items:center; padding:14px; z-index:50;
    animation:fadeIn .25s ease both;
  }
  .card{
    background:linear-gradient(165deg, var(--cream), #e6d8ba);
    color:var(--ink); border-radius:20px; padding:24px 20px;
    width:100%; max-width:430px; max-height:88dvh; overflow-y:auto;
    box-shadow:0 26px 70px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.2) inset;
    position:relative;
    animation:cardIn .45s var(--spring) both;
  }
  .card::before{
    content:""; position:absolute; inset:0; border-radius:20px; pointer-events:none;
    background:linear-gradient(105deg, transparent 30%, rgba(255,255,255,.6) 46%, transparent 60%);
    background-size:250% 100%;
    animation:sheen 1.1s ease .2s both;
  }
  @keyframes sheen{from{background-position:150% 0;} to{background-position:-90% 0;}}
  .card .eyebrow{color:var(--rust);}
  .card h3{font-size:26px; margin:4px 0 2px; color:var(--ink); font-weight:900; line-height:1.08;}
  .card .catalog{font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; color:var(--ink-soft); text-transform:uppercase;}
  .card .art{font-size:70px; text-align:center; margin:12px 0;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,.28)); animation:artIn .55s var(--spring) both;}
  @keyframes artIn{0%{transform:scale(.3) rotate(-25deg); opacity:0;} 100%{transform:none; opacity:1;}}
  .fact{
    font-size:15.5px; background:rgba(224,83,58,.09);
    border:1.5px dashed var(--rust); border-radius:12px;
    padding:13px; margin:10px 0 14px;
  }
  .fact .fact-label{
    font-family:var(--mono); font-size:10.5px; font-weight:600; letter-spacing:.14em;
    text-transform:uppercase; color:var(--rust); display:block; margin-bottom:5px;
  }
  .quiz-q{font-weight:700; font-size:16.5px; margin-bottom:9px;}
  .choices{display:flex; flex-direction:column; gap:8px;}
  .choice{
    text-align:left; background:#fffaef; border:2px solid #d8c69f;
    border-radius:12px; padding:12px 14px; font-size:15px; color:var(--ink);
    transition:all .12s var(--spring);
  }
  .choice:hover{border-color:var(--rust); transform:translateX(3px);}
  .choice:active{transform:scale(.985);}
  .choice.wrong{border-color:var(--stamp); background:#f7ddd3; animation:tshake .4s ease; opacity:.65;}
  .choice.right{border-color:#3c8f4e; background:#dcf1de;}
  .quiz-note{font-size:13px; color:var(--ink-soft); min-height:20px; margin-top:8px;}
  .card .actions{display:flex; gap:9px; margin-top:14px;}
  .card .actions .btn-main{flex:1;}

  .stampwrap{position:relative;}
  .stamp{
    position:absolute; top:-4px; right:0;
    font-family:var(--display); font-weight:900; font-size:19px;
    letter-spacing:.05em; text-transform:uppercase; color:var(--stamp);
    border:3px solid var(--stamp); border-radius:8px; padding:4px 9px;
    transform:rotate(-13deg) scale(3); opacity:0;
    pointer-events:none; mix-blend-mode:multiply;
  }
  .stamp.slam{animation:slam .5s cubic-bezier(.3,1.5,.5,1) .2s both;}
  @keyframes slam{
    0%{transform:rotate(-13deg) scale(3); opacity:0;}
    60%{transform:rotate(-13deg) scale(.9); opacity:1;}
    100%{transform:rotate(-13deg) scale(1); opacity:.93;}
  }

  /* ---------- journal ---------- */
  .journal{
    background:linear-gradient(165deg, var(--cream), #e8dabc);
    color:var(--ink); border-radius:18px; padding:20px 17px;
    animation:fadeUp .4s var(--spring) both;
    box-shadow:0 12px 34px rgba(0,0,0,.4);
  }
  .journal h2{font-size:27px; font-weight:900;}
  .journal .sub{font-family:var(--mono); font-size:11px; color:var(--ink-soft);
    letter-spacing:.1em; text-transform:uppercase; margin-bottom:12px;}
  .j-site{margin-bottom:16px;}
  .j-site h3{font-size:16px; color:var(--rust); border-bottom:2px solid #d8c69f;
    padding-bottom:4px; margin-bottom:6px; font-weight:900;}
  .j-entry{display:flex; gap:11px; align-items:flex-start; padding:9px 0; border-bottom:1px dashed #d8c69f;}
  .j-entry:last-child{border-bottom:none;}
  .j-entry .em{font-size:26px; flex-shrink:0;}
  .j-entry .nm{font-weight:700; font-size:14.5px;}
  .j-entry .fx{font-size:13px; color:var(--ink-soft);}
  .j-entry.locked{opacity:.42;}
  .j-entry.locked .nm{font-style:italic;}
  .journal-count{font-family:var(--mono); font-size:12.5px; text-align:center; color:var(--ink-soft); margin-top:6px;}
  .journal-link{margin-top:16px; width:100%;}

  @keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
  @keyframes fadeUp{from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:none;}}
  @keyframes cardIn{from{opacity:0; transform:translateY(30px) scale(.94);} to{opacity:1; transform:none;}}

  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01ms !important; transition-duration:.01ms !important;}
    .particle{display:none;}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="fx"></div>

<script>
"use strict";

/* =========================================================
   DIG QUEST — every Field Fact below is a well-documented,
   verifiable historical/archaeological fact. Sources include
   museum records and mainstream archaeology scholarship.
   ========================================================= */

const SITES = [
  {
    id:"egypt",
    name:"Valley of the Kings",
    where:"Egypt",
    emoji:"🏜️",
    blurb:"A desert valley where pharaohs of ancient Egypt were buried for around 500 years.",
    artifacts:[
      {
        id:"rosetta", emoji:"🪨", name:"The Rosetta Stone", cat:"EG-001",
        fact:"The Rosetta Stone, found in Egypt in 1799, carries the same royal message written three ways: Egyptian hieroglyphs, Demotic script, and ancient Greek. Because scholars could already read the Greek, it became the key to decoding hieroglyphs — Jean-François Champollion cracked the code in 1822.",
        q:{
          prompt:"Why was the Rosetta Stone so important?",
          choices:[
            "It had the same text in three scripts, helping scholars decode hieroglyphs",
            "It was the heaviest stone ever found in Egypt",
            "It showed a map to a pharaoh's treasure"
          ],
          answer:0
        }
      },
      {

/* ---------------- state ---------------- */
const state = {
  screen:"title",
  found:{},
  celebrated:{},
  siteId:null,
  dig:null,
  tool:"brush",
  tip:null,
  muted:false,
  journalBack:"map"
};

function foundCount(site){ return site.artifacts.filter(a=>state.found[a.id]).length; }
function totalFound(){ return SITES.reduce((n,s)=>n+foundCount(s),0); }
function totalArtifacts(){ return SITES.reduce((n,s)=>n+s.artifacts.length,0); }

function questProgress(q){
  if(q.kind==="count") return { done: Math.min(totalFound(), q.target), total: q.target };
  if(q.kind==="ids")   return { done: q.ids.filter(id=>state.found[id]).length, total: q.ids.length };
  if(q.kind==="site"){
    const complete = SITES.some(s=>foundCount(s)===s.artifacts.length);
    return complete ? { done:1, total:1 } : { done:0, total:1 };
  }
  return { done: totalFound(), total: totalArtifacts() };
}
function questDone(q){ const p=questProgress(q); return p.done>=p.total; }

/* ---------------- saving ---------------- */
const SAVE_KEY = "digquest-save-v1";
function saveProgress(){
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      found: state.found, celebrated: state.celebrated, muted: state.muted
    }));
  }catch(e){ /* storage unavailable — play continues, just without saving */ }
}
function loadProgress(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    if(data && typeof data.found === "object" && data.found !== null){
      const validIds = new Set(SITES.flatMap(s=>s.artifacts.map(a=>a.id)));
      for(const id of Object.keys(data.found)){
        if(validIds.has(id) && data.found[id] === true) state.found[id] = true;
      }
      if(data.celebrated && typeof data.celebrated === "object"){
        const validQ = new Set(QUESTS.map(q=>q.id));
        for(const id of Object.keys(data.celebrated)){
          if(validQ.has(id) && data.celebrated[id] === true) state.celebrated[id] = true;
        }
      }
      state.muted = !!data.muted;
    }
  }catch(e){ /* corrupted or unavailable — start fresh */ }
  // quests already complete are marked quietly, so reopening the game
  // never triggers a pile of old badge ceremonies
  QUESTS.forEach(q=>{ if(questDone(q)) state.celebrated[q.id] = true; });
}
function resetProgress(){
  try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
  state.found = {}; state.celebrated = {};
  state.screen = "map"; render();
}

/* ---------------- sound (synthesized — no files needed) ---------------- */
let actx = null, audioTried = false;
function ac(){
  if(!audioTried){
    audioTried = true;
    try{ actx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ actx = null; }
  }
  if(actx && actx.state === "suspended"){ try{ actx.resume(); }catch(e){} }
  return actx;
}
function tone(freq, dur, type, vol, delay){
  const c = ac(); if(!c || state.muted) return;
  try{
    const o = c.createOscillator(), g = c.createGain();
    o.type = type || "sine"; o.frequency.value = freq;
    o.connect(g); g.connect(c.destination);
    const t = c.currentTime + (delay || 0);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(vol || 0.12, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur + 0.03);
  }catch(e){}
}
function thud(){
  const c = ac(); if(!c || state.muted) return;
  try{
    const len = Math.floor(c.sampleRate * 0.13);
    const buf = c.createBuffer(1, len, c.sampleRate);
    const dat = buf.getChannelData(0);
    for(let i=0;i<len;i++) dat[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2.5);
    const src = c.createBufferSource(); src.buffer = buf;
    const f = c.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = 700;
    const g = c.createGain(); g.gain.value = 0.14;
    src.connect(f); f.connect(g); g.connect(c.destination);
    src.start();
  }catch(e){}
}

/* ---------------- particles ---------------- */
function burst(el, color, n){
  try{
    if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    const host = document.getElementById("fx"); if(!host || !el) return;
    const r = el.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    for(let i=0;i<(n||9);i++){
      const p = document.createElement("div");
      p.className = "particle";
      const a = Math.random()*Math.PI*2, d = 18 + Math.random()*52;
      const s = 3 + Math.random()*6;
      p.style.setProperty("--dx", (Math.cos(a)*d)+"px");
      p.style.setProperty("--dy", (Math.sin(a)*d + 14)+"px");
      p.style.left = cx+"px"; p.style.top = cy+"px";
      p.style.width = p.style.height = s+"px";
      p.style.background = color;
      p.style.animationDelay = (Math.random()*0.05)+"s";
      host.appendChild(p);
      setTimeout(()=>p.remove(), 800);
    }
  }catch(e){}
}
function shakeScreen(){
  try{
    if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    const app = document.getElementById("app"); if(!app) return;
    app.classList.remove("shakescreen"); void app.offsetWidth; app.classList.add("shakescreen");
    setTimeout(()=>app.classList.remove("shakescreen"), 420);
  }catch(e){}
}

let traveling = false;
function travelTo(siteId){
  if(traveling) return;
  const svg = document.getElementById("worldmap");
  const from = state.lastPos || HQ_POS;
  const to = sitePos(siteId);
  const reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if(!svg || reduced){
    state.lastPos = to;
    startDig(siteId);
    return;
  }
  traveling = true;
  SFX.travel();
  try{
    const NS = "http://www.w3.org/2000/svg";
    // control point arcs the route upward
    const cx = (from.x+to.x)/2, cy = Math.max(30, Math.min(from.y,to.y) - 70);
    const trail = document.createElementNS(NS, "polyline");
    trail.setAttribute("class","trail");
    svg.appendChild(trail);
    const plane = document.createElementNS(NS, "text");
    plane.setAttribute("class","plane");
    plane.textContent = "✈️";
    plane.setAttribute("text-anchor","middle");
    svg.appendChild(plane);
    const pts = [];
    const dur = 1150, t0 = performance.now();
    let finished = false;
    const finish = ()=>{
      if(finished) return;
      finished = true;
      traveling = false;
      state.lastPos = to;
      startDig(siteId);
    };
    const step = (now)=>{
      const t = Math.min(1, (now - t0)/dur);
      const e = t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; // easeInOut
      const x = (1-e)*(1-e)*from.x + 2*(1-e)*e*cx + e*e*to.x;
      const y = (1-e)*(1-e)*from.y + 2*(1-e)*e*cy + e*e*to.y;
      pts.push(x.toFixed(1)+","+y.toFixed(1));
      trail.setAttribute("points", pts.join(" "));
      plane.setAttribute("x", x); plane.setAttribute("y", y-6);
      if(t<1) requestAnimationFrame(step);
      else setTimeout(finish, 160);
    };
    requestAnimationFrame(step);
    setTimeout(finish, dur + 900); // safety net so travel can never strand the player
  }catch(e){
    traveling = false;
    state.lastPos = to;
    startDig(siteId);
  }
}

function renderWorldMap(){
  const done = id => SITES.find(s=>s.id===id).artifacts.every(a=>state.found[a.id]);
  let pins = "";
  SITES.forEach((s,i)=>{
    const p = sitePos(s.id);
    const [ox,oy] = PIN_LABEL_OFF[s.id] || [0,-16];
    const d = done(s.id);
    pins += `
      <g class="pin-g" data-site="${s.id}" role="button" aria-label="${esc(s.name)}">
        <circle class="pin-ring ${d?"done":""}" cx="${p.x}" cy="${p.y}" r="11"/>
        <circle class="pin-dot ${d?"done":""}" cx="${p.x}" cy="${p.y}" r="8"/>
        <text class="pin-num" x="${p.x+ox}" y="${p.y+oy+6}" text-anchor="middle">${d?"✓":i+1}</text>
        <circle class="pin-hit" cx="${p.x}" cy="${p.y}" r="26"/>
      </g>`;
  });
  let grid = "";
  for(let x=125; x<1000; x+=125) grid += `<line class="map-grid" x1="${x}" y1="30" x2="${x}" y2="420"/>`;
  for(let y=100; y<420; y+=80) grid += `<line class="map-grid" x1="0" y1="${y}" x2="1000" y2="${y}"/>`;
  const lands = `<path class="map-land" fill-rule="evenodd" d="${WORLD_D}"/>`;
  const frag = h(`
    <div class="map-wrap">
      <svg id="worldmap" viewBox="0 25 1000 400" xmlns="http://www.w3.org/2000/svg">
        ${grid}${lands}
        <text class="hq-icon" x="${HQ_POS.x}" y="${HQ_POS.y-8}" text-anchor="middle">⛺</text>
        <text class="map-label" x="500" y="410" text-anchor="middle">· Expedition Map ·</text>
        ${pins}
      </svg>
      <div class="map-hint">Tap a pin to fly there</div>
    </div>
  `);
  frag.querySelectorAll(".pin-g").forEach(g=>{
    g.addEventListener("click", ()=>{ ac(); travelTo(g.dataset.site); });
  });
  return frag;
}

/* ---------------- dig setup ---------------- */
function artIndex(site, id){ return site.artifacts.findIndex(a=>a.id===id); }
function fragColor(site, id){ return FRAG_COLORS[artIndex(site, id) % FRAG_COLORS.length]; }

function startDig(siteId){
  const site = SITES.find(s=>s.id===siteId);
  const remaining = site.artifacts.filter(a=>!state.found[a.id]);
  const total = GRID_COLS*GRID_ROWS;
  const tiles = [];
  for(let i=0;i<total;i++) tiles.push({depth:2, artifact:null, revealed:false});

  const idxs = shuffle([...Array(total).keys()]);
  const targets = {}, revealed = {};
  let cursor = 0;
  remaining.forEach(a=>{
    targets[a.id] = []; revealed[a.id] = 0;
    for(let f=0; f<FRAGS_PER_ARTIFACT; f++){
      const t = idxs[cursor++];
      tiles[t].artifact = a.id;
      targets[a.id].push(t);
    }
  });

  state.siteId = siteId;
  state.dig = { tiles, targets, revealed };
  state.tool = "brush";
  state.tip = remaining.length
    ? `Dig by tapping squares. <b>${remaining.length} artifacts</b> are buried here — each one is <b>${FRAGS_PER_ARTIFACT} pieces</b> scattered apart. Matching pieces share a <b>colour and number</b>.`
    : "You've certified every find here. Head back to the map and visit another site!";
  state.screen = "dig";
  render();
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

/* ---------------- dig actions ---------------- */
function fragmentsLeft(){ return state.dig.tiles.filter(t=>t.artifact && !t.revealed).length; }

function digTile(idx, el){
  if(modal) return;
  const d = state.dig;
  const t = d.tiles[idx];
  const site = SITES.find(s=>s.id===state.siteId);

  // already-recovered fragment: show its whole set so the board explains itself
  if(t.revealed){
    const n = artIndex(site, t.artifact) + 1;
    const got = d.revealed[t.artifact];
    const left = FRAGS_PER_ARTIFACT - got;
    SFX.clink();
    // pulse every piece of this same artifact so the set is obvious
    document.querySelectorAll('.tile.fragment[data-a="'+t.artifact+'"]').forEach(f=>{
      f.classList.remove("pulse"); void f.offsetWidth; f.classList.add("pulse");
    });
    setTip(left > 0
      ? `That's <b>find ${n}</b> — you have <b>${got} of ${FRAGS_PER_ARTIFACT}</b> of its pieces (they're glowing now). <b>${left} more</b> buried in other squares.`
      : `Find ${n} is fully recovered.`);
    return;
  }

  if(t.depth===0){
    SFX.nope();
    setTip(`Nothing was buried here. <b>${fragmentsLeft()} piece${fragmentsLeft()===1?"":"s"}</b> still hidden — try a square that still has dirt.`);
    return;
  }

  if(t.artifact){
    if(state.tool==="shovel"){
      el.classList.remove("shake"); void el.offsetWidth; el.classList.add("shake");
      SFX.nope();
      setTip("⚠️ Careful — something <b>fragile</b> is buried here! A shovel could break it. Tap <b>🖌️ Brush</b> below, then tap this square again.");
      return;
    }
    t.depth--;
    if(t.depth===0){
      t.revealed = true;
      d.revealed[t.artifact]++;
      const art = site.artifacts.find(a=>a.id===t.artifact);
      const got = d.revealed[t.artifact];
      const n = artIndex(site, t.artifact) + 1;
      const col = fragColor(site, t.artifact);
      burst(el, col, 14);
      if(got < FRAGS_PER_ARTIFACT){
        SFX.fragment();
        const left = FRAGS_PER_ARTIFACT - got;
        setTip(`🧩 A piece of <b>find ${n}</b>! That's <b>${got} of ${FRAGS_PER_ARTIFACT}</b>. Look for <b>${left} more</b> with the same colour and number.`);
        render();
      }else{
        SFX.reveal(); shakeScreen();
        render();
        setTimeout(()=>openDiscovery(art), 400);
      }
    }else{
      SFX.dig();
      burst(el, "#a86c3c", 6);
      setTip("Something's under here — <b>brush again</b> on this same square to lift it out.");
      render();
    }
  }else{
    SFX.dig();
    burst(el, "#8a5a30", 7);
    if(state.tool==="brush"){
      t.depth--;
      setTip(t.depth===0
        ? `Just dirt here. <b>${fragmentsLeft()} piece${fragmentsLeft()===1?"":"s"}</b> still buried — try another square.`
        : "Brushing... tap this square again to finish clearing it.");
    }else{
      t.depth = 0;
      setTip(`Cleared! Nothing buried there. <b>${fragmentsLeft()} piece${fragmentsLeft()===1?"":"s"}</b> still hidden in this trench.`);
    }
    render();
  }
}

function setTip(html){
  state.tip = html;
  const el = document.getElementById("digtip");
  if(el){
    el.innerHTML = html;
    el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash");
  }
}

/* ---------------- discovery + quiz ---------------- */
let modal = null;
const discoveryQueue = [];
const questQueue = [];

function openDiscovery(art){
  if(modal){ discoveryQueue.push(art); return; }
  modal = { art, phase:"fact", wrongPicks:new Set() };
  render();
}
function closeModal(){
  modal = null;
  if(discoveryQueue.length){ openDiscovery(discoveryQueue.shift()); return; }
  if(questQueue.length){ modal = { quest: questQueue.shift() }; SFX.quest(); render(); return; }
  const site = SITES.find(s=>s.id===state.siteId);
  const remaining = site ? site.artifacts.filter(a=>!state.found[a.id]).length : 0;
  state.tip = remaining
    ? "Back to the trench — more pieces are still buried here."
    : "🎉 Site complete! Head back to the map to choose your next expedition.";
  render();
}
function toQuiz(){ modal.phase = "quiz"; render(); }

function pickChoice(i, btn){
  const art = modal.art;
  if(i === art.q.answer){
    state.found[art.id] = true;
    QUESTS.forEach(q=>{
      if(!state.celebrated[q.id] && questDone(q)){
        state.celebrated[q.id] = true;
        questQueue.push(q);
      }
    });
    saveProgress();
    SFX.correct();
    btn.classList.add("right");
    modal.phase = "certified";
    render();
  }else{
    SFX.wrong();
    modal.wrongPicks.add(i);
    btn.classList.add("wrong");
    const note = document.getElementById("quiznote");
    if(note) note.textContent = "Not quite — take another look at the Field Fact above, then try again.";
  }
}

/* ---------------- rendering ---------------- */
function h(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content; }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";
  if(state.screen==="title") app.append(renderTitle());
  else if(state.screen==="map") app.append(renderMap());
  else if(state.screen==="dig") app.append(renderDig());
  else if(state.screen==="journal") app.append(renderJournal());
  else if(state.screen==="quests") app.append(renderQuests());
  if(modal) app.append(modal.quest ? renderQuestModal() : renderModal());
}

function renderTitle(){
  const hasSave = totalFound() > 0;
  const frag = h(`
    <div class="screen-title">
      <div class="title-emblem">⛏️</div>
      <h1>DIG<span class="accent">·</span>QUEST</h1>
      <p class="tagline">You're the archaeologist. Travel to real dig sites, uncover real artifacts, and earn your place in the Field Journal.</p>
      <p class="promise">Field promise: every fact in this game is <b>real and verifiable</b>. No made-up history. Ever.</p>
      <div><button class="btn-main" id="start">${hasSave ? "Continue expedition ("+totalFound()+"/"+totalArtifacts()+" finds)" : "Start the expedition"}</button></div>
    </div>
  `);
  frag.getElementById("start").onclick = ()=>{ ac(); SFX.clink(); state.screen="map"; render(); };
  return frag;
}

function renderMap(){
  const done = totalFound(), total = totalArtifacts();
  const frag = h(`
    <div>
      <div class="topbar">
        <span class="title">⛏️ Dig Quest</span>
        <span style="display:flex; align-items:center; gap:8px;">
          <span class="eyebrow">${done}/${total} certified</span>
          <button class="mute" id="mute" aria-label="sound">${state.muted?"🔇":"🔊"}</button>
        </span>
      </div>
      <div class="map-head">
        <h2>Choose a dig site</h2>
        <p>Five real places. Fifteen real finds. Where to first?</p>
      </div>
      <div id="mapslot"></div>
      <div class="sites" id="sites"></div>
      ${done===total ? `
        <div class="master-banner">
          <div class="big">🏆</div>
          <h3>Master Archaeologist</h3>
          <p>You certified every artifact — and every fact you learned along the way is true.</p>
        </div>` : ``}
      <div class="nav-row">
        <button class="btn-ghost" id="quests">🗺️ Quests (${QUESTS.filter(questDone).length}/${QUESTS.length})</button>
        <button class="btn-ghost" id="journal">📓 Journal</button>
      </div>
    </div>
  `);
  frag.getElementById("mapslot").append(renderWorldMap());
  const wrap = frag.getElementById("sites");
  SITES.forEach((site,i)=>{
    const n = foundCount(site), t = site.artifacts.length;
    const card = h(`
      <button class="site-card" style="animation-delay:${i*0.05}s">
        <span class="site-emoji">${site.emoji}</span>
        <span class="site-info">
          <span class="where">📍 ${i+1} · ${esc(site.where)}</span>
          <h3>${esc(site.name)}</h3>
          <span class="prog">${esc(site.blurb)}</span>
          <span class="site-bar"><i style="width:${(n/t)*100}%"></i></span>
          <span class="prog">${n} / ${t} certified</span>
        </span>
        ${n===t ? `<span class="site-done">✔</span>`:""}
      </button>
    `).firstElementChild;
    card.onclick = ()=>{ ac(); SFX.clink(); travelTo(site.id); };
    wrap.append(card);
  });
  frag.getElementById("journal").onclick = ()=>{ state.journalBack="map"; state.screen="journal"; render(); };
  frag.getElementById("quests").onclick = ()=>{ state.screen="quests"; render(); };
  frag.getElementById("mute").onclick = ()=>{ state.muted=!state.muted; saveProgress(); render(); };
  return frag;
}

function renderQuests(){
  const frag = h(`
    <div>
      <div class="topbar">
        <button class="btn-ghost" id="back">← Back</button>
        <span class="eyebrow">${QUESTS.filter(questDone).length}/${QUESTS.length} complete</span>
      </div>
      <div class="map-head">
        <h2>🗺️ Quest Board</h2>
        <p>Missions for a working archaeologist. Certify finds to complete them.</p>
      </div>
      <div class="sites" id="qlist"></div>
    </div>
  `);
  const wrap = frag.getElementById("qlist");
  QUESTS.forEach((q,i)=>{
    const p = questProgress(q);
    const done = p.done>=p.total;
    const pct = Math.round((p.done/p.total)*100);
    const progText = done ? "Complete!" : `Progress: ${p.done} / ${p.total}`;
    wrap.append(h(`
      <div class="site-card quest-card ${done?"quest-done":""}" style="animation-delay:${i*0.04}s">
        <span class="site-emoji">${q.emoji}</span>
        <span class="site-info">
          <h3>${esc(q.name)}</h3>
          <span class="prog">${esc(q.desc)}</span>
          <span class="site-bar"><i style="width:${pct}%"></i></span>
          <span class="prog ${done?"prog-done":""}">${esc(progText)}</span>
        </span>
        ${done?`<span class="site-done">✔</span>`:""}
      </div>`));
  });
  frag.getElementById("back").onclick = ()=>{ state.screen="map"; render(); };
  return frag;
}

function renderDig(){
  const site = SITES.find(s=>s.id===state.siteId);
  const d = state.dig;
  const frag = h(`
    <div>
      <div class="topbar">
        <button class="btn-ghost" id="back">← Map</button>
        <span style="display:flex; align-items:center; gap:8px;">
          <button class="btn-ghost" id="journal">📓</button>
          <button class="mute" id="mute" aria-label="sound">${state.muted?"🔇":"🔊"}</button>
        </span>
      </div>
      <div class="dig-head">
        <h2>${site.emoji} ${esc(site.name)}</h2>
        <p>${esc(site.where)} · Excavation Trench A</p>
      </div>
      <div class="frag-tracker" id="tracker"></div>
      <div class="grid" id="grid"></div>
      <div class="tools">
        <button class="tool ${state.tool==="brush"?"active":""}" id="toolBrush">🖌️ Brush</button>
        <button class="tool ${state.tool==="shovel"?"active":""}" id="toolShovel">⛏️ Shovel</button>
      </div>
      <div class="dig-tip flash" id="digtip">${state.tip||""}</div>
    </div>
  `);

  const tracker = frag.getElementById("tracker");
  site.artifacts.forEach((a,i)=>{
    const col = FRAG_COLORS[i % FRAG_COLORS.length];
    if(state.found[a.id]){
      tracker.append(h(`<span class="frag-pill full" style="color:${col}; border-color:${col}">${a.emoji} ${esc(a.name)} ✔</span>`));
    }else{
      const got = d.revealed[a.id]||0;
      const full = got===FRAGS_PER_ARTIFACT;
      tracker.append(h(`<span class="frag-pill ${got>0?"live":""} ${full?"full":""}" style="${got>0?`border-color:${col}`:""}">
        <span class="dot" style="background:${col}; color:${col}"></span>Find ${i+1}: ${got}/${FRAGS_PER_ARTIFACT}
      </span>`));
    }
  });

  const grid = frag.getElementById("grid");
  d.tiles.forEach((t,i)=>{
    let cls="tile", label="", extra="";
    if(t.revealed){
      const n = artIndex(site, t.artifact) + 1;
      const col = fragColor(site, t.artifact);
      cls += " fragment";
      label = `<span class="fi">🧩</span>`;
      extra = ` style="--fc:${col}" data-n="${n}" data-a="${esc(t.artifact)}"`;
    }
    else if(t.depth===0){ cls+=" cleared"; }
    else if(t.depth===1){ cls+=" depth1"; }
    const el = h(`<button class="${cls}"${extra} aria-label="dig square ${i+1}">${label}</button>`).firstElementChild;
    el.onclick = ()=>digTile(i, el);
    grid.append(el);
  });

  frag.getElementById("back").onclick = ()=>{ state.screen="map"; render(); };
  frag.getElementById("journal").onclick = ()=>{ state.journalBack="dig"; state.screen="journal"; render(); };
  frag.getElementById("mute").onclick = ()=>{ state.muted=!state.muted; saveProgress(); render(); };
  frag.getElementById("toolBrush").onclick = ()=>{
    ac(); SFX.clink(); state.tool="brush";
    state.tip = "🖌️ <b>Brush ready.</b> Slower on plain dirt, but it's the only tool that can lift a fragile find.";
    render();
  };
  frag.getElementById("toolShovel").onclick = ()=>{
    ac(); SFX.clink(); state.tool="shovel";
    state.tip = "⛏️ <b>Shovel ready.</b> Clears empty dirt in one tap — great for searching fast. It won't touch fragile finds.";
    render();
  };
  return frag;
}

function renderModal(){
  const art = modal.art;
  let inner = "";
  if(modal.phase==="fact"){
    inner = `
      <span class="eyebrow">Discovery!</span>
      <h3>${esc(art.name)}</h3>
      <div class="catalog">Catalog № ${art.cat}</div>
      <div class="art">${art.emoji}</div>
      <div class="fact"><span class="fact-label">Field Fact — verified</span>${esc(art.fact)}</div>
      <div class="actions"><button class="btn-main" id="next">I read it — quiz me!</button></div>
    `;
  }else if(modal.phase==="quiz"){
    inner = `
      <span class="eyebrow">Field Certification</span>
      <h3>${esc(art.name)}</h3>
      <div class="art">${art.emoji}</div>
      <div class="fact"><span class="fact-label">Field Fact — verified</span>${esc(art.fact)}</div>
      <p class="quiz-q">${esc(art.q.prompt)}</p>
      <div class="choices" id="choices"></div>
      <p class="quiz-note" id="quiznote"></p>
    `;
  }else{
    inner = `
      <div class="stampwrap">
        <span class="eyebrow">Entry added to Field Journal</span>
        <h3>${esc(art.name)}</h3>
        <div class="catalog">Catalog № ${art.cat}</div>
        <div class="art">${art.emoji}</div>
        <span class="stamp slam">Certified Find</span>
      </div>
      <div class="fact"><span class="fact-label">You learned a true thing</span>${esc(art.fact)}</div>
      <div class="actions"><button class="btn-main" id="close">Keep digging</button></div>
    `;
  }
  const frag = h(`<div class="overlay"><div class="card">${inner}</div></div>`);
  if(modal.phase==="fact"){
    frag.getElementById("next").onclick = toQuiz;
  }else if(modal.phase==="quiz"){
    const wrap = frag.getElementById("choices");
    art.q.choices.forEach((c,i)=>{
      const b = h(`<button class="choice ${modal.wrongPicks.has(i)?"wrong":""}">${esc(c)}</button>`).firstElementChild;
      b.onclick = ()=>pickChoice(i,b);
      wrap.append(b);
    });
  }else{
    frag.getElementById("close").onclick = closeModal;
  }
  return frag;
}

function renderQuestModal(){
  const q = modal.quest;
  const frag = h(`
    <div class="overlay"><div class="card">
      <div class="stampwrap">
        <span class="eyebrow">Quest complete</span>
        <h3>${esc(q.name)}</h3>
        <div class="art">${q.emoji}</div>
        <span class="stamp slam">Quest Done</span>
      </div>
      <div class="fact"><span class="fact-label">Mission accomplished</span>${esc(q.desc)} You earned the ${q.emoji} ${esc(q.name)} badge — see it on the Quest Board.</div>
      <div class="actions"><button class="btn-main" id="close">Onward!</button></div>
    </div></div>
  `);
  frag.getElementById("close").onclick = closeModal;
  return frag;
}

function renderJournal(){
  const frag = h(`
    <div>
      <div class="topbar">
        <button class="btn-ghost" id="back">← Back</button>
        <span class="eyebrow">Field Journal</span>
      </div>
      <div class="journal">
        <h2>📓 Field Journal</h2>
        <p class="sub">Certified finds & the true facts behind them</p>
        <div id="entries"></div>
        <p class="journal-count">${totalFound()} of ${totalArtifacts()} artifacts certified</p>
      </div>
      <button class="btn-ghost journal-link" id="reset">Start a brand-new expedition</button>
    </div>
  `);
  const wrap = frag.getElementById("entries");
  SITES.forEach(site=>{
    const sec = h(`<div class="j-site"><h3>${site.emoji} ${esc(site.name)}, ${esc(site.where)}</h3></div>`).firstElementChild;
    site.artifacts.forEach(a=>{
      if(state.found[a.id]){
        sec.append(h(`
          <div class="j-entry">
            <span class="em">${a.emoji}</span>
            <span>
              <span class="nm">${esc(a.name)} · <span style="font-family:var(--mono); font-size:10.5px;">${a.cat}</span></span><br>
              <span class="fx">${esc(a.fact)}</span>
            </span>
          </div>`));
      }else{
        sec.append(h(`
          <div class="j-entry locked">
            <span class="em">❔</span>
            <span><span class="nm">Undiscovered find</span><br>
            <span class="fx">Keep excavating at ${esc(site.name)}...</span></span>
          </div>`));
      }
    });
    wrap.append(sec);
  });
  frag.getElementById("back").onclick = ()=>{ state.screen = state.journalBack||"map"; render(); };
  const resetBtn = frag.getElementById("reset");
  resetBtn.onclick = ()=>{
    if(resetBtn.dataset.armed){ resetProgress(); }
    else{
      resetBtn.dataset.armed = "1";
      resetBtn.textContent = "Really erase the whole journal? Tap again to confirm";
      setTimeout(()=>{ if(document.body.contains(resetBtn)){ delete resetBtn.dataset.armed; resetBtn.textContent = "Start a brand-new expedition"; } }, 4000);
    }
  };
  return frag;
}

loadProgress();
render();
</script>
